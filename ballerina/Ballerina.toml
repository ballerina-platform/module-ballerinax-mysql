[package]
org = "ballerinax"
name = "mysql"
version = "1.17.0"
authors = ["Ballerina"]
keywords = ["Client", "Network", "SQL", "RDBMS", "MySQL", "Vendor/Oracle", "Area/Database", "Type/Connector", "Type/Trigger"]
repository = "https://github.com/ballerina-platform/module-ballerinax-mysql"
icon = "icon.png"
license = ["Apache-2.0"]
distribution = "2201.12.0"

# Local testing: until cdc 1.3.2 + mysql.cdc.driver 1.0.3 (Debezium 3.5.1) are published to
# Ballerina Central, consume them from the local repository (`bal push --repository=local`).
# Remove once released.
[[dependency]]
org = "ballerinax"
name = "cdc"
version = "1.3.2"
repository = "local"

[[dependency]]
org = "ballerinax"
name = "mysql.cdc.driver"
version = "1.0.3"
repository = "local"

[platform.java21]
graalvmCompatible = true

[[platform.java21.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "mysql-native"
version = "1.17.0"
path = "../native/build/libs/mysql-native-1.17.0-SNAPSHOT.jar"

[[platform.java21.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "sql-native"
version = "1.17.1"
path = "./lib/sql-native-1.17.1.jar"
