[package]
org = "ballerinax"
name = "mysql"
version = "@toml.version@"
authors = ["Ballerina"]
keywords = ["Client", "Network", "SQL", "RDBMS", "MySQL", "Vendor/Oracle", "Area/Database", "Type/Connector", "Type/Trigger"]
repository = "https://github.com/ballerina-platform/module-ballerinax-mysql"
icon = "icon.png"
license = ["Apache-2.0"]
distribution = "2201.14.0-20260527-050400-74f7e6bf"

[platform.java25]
graalvmCompatible = true

[[platform.java25.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "mysql-native"
version = "@toml.version@"
path = "../native/build/libs/mysql-native-@project.version@.jar"

[[platform.java25.dependency]]
groupId = "io.ballerina.stdlib"
artifactId = "sql-native"
version = "@sql.version@"
path = "./lib/sql-native-@sql.native.version@.jar"
